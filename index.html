<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 SSENS SQUASH RANKING 🏆</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --gold: #fbbf24;
            --silver: #3b82f6;
            --bronze: #b45309;
            --selected-bg: rgba(59, 130, 246, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh; 
            display: flex;
            justify-content: center;
            overflow: hidden; 
        }

        .container {
            width: 100%;
            max-width: 1100px; /* 기존 900px에서 확장 */
            padding: 10px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem; 
            margin: 5px 0 10px 0; 
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            font-weight: 800;
        }

        /* 2단 분할 레이아웃 */
        .content-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex: 1; /* 남은 높이 전체 차지 */
            margin-bottom: 10px;
            overflow: hidden; /* 내부 개별 스크롤을 위해 */
        }

        /* 공통 카드 스타일 */
        .card-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden; /* 자식이 스크롤을 가지도록 */
        }

        .panel-header {
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            color: var(--gold);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* 스크롤바 디자인 */
        .scroll-area::-webkit-scrollbar { width: 8px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }

        /* 좌측 랭킹 리스트 */
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 6px; 
        }

        .rank-item {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 15px; 
            border-radius: 10px;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer; /* 클릭 가능한 형태 */
            border: 1px solid transparent;
        }

        .rank-item:hover {
            transform: translateX(5px);
            background: rgba(0, 0, 0, 0.4);
        }

        .rank-item.selected {
            background: var(--selected-bg);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .rank-number {
            font-size: 1.1rem;
            font-weight: 800;
            width: 45px;
        }

        .rank-name {
            font-size: 1rem;
            font-weight: 600;
            flex: 1;
        }

        .rank-1 .rank-number, .rank-1 .rank-name { color: var(--gold); }
        .rank-2 .rank-number, .rank-2 .rank-name { color: var(--silver); text-shadow: 0 0 8px rgba(59, 130, 246, 0.5); } 
        .rank-3 .rank-number, .rank-3 .rank-name { color: var(--bronze); text-shadow: 0 0 5px rgba(255,255,255,0.2); }

        /* 우측 히스토리표 디자인 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid var(--primary);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .history-item.win { border-left-color: var(--success); }
        .history-item.lose { border-left-color: var(--text-muted); }
        .history-item.down { border-left-color: var(--danger); }

        .hist-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .hist-title {
            font-weight: 700;
            margin-bottom: 2px;
        }
        .hist-title.up { color: var(--success); }
        .hist-title.down { color: var(--danger); }
        .hist-title.same { color: var(--silver); }
        .hist-manager {
            font-size: 0.75rem;
            color: var(--gold);
            margin-top: 4px;
            text-align: right;
        }

        .empty-history {
            text-align: center;
            color: var(--text-muted);
            margin-top: 40px;
            font-size: 0.95rem;
        }

        /* 컨트롤 패널 영역 (한 줄 배치) */
        .control-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 10px 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .control-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap; 
            justify-content: space-between;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        select, button {
            padding: 8px 10px; 
            border-radius: 8px;
            border: 1px solid var(--card-border);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.9rem;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
        }

        select option {
            background: #1e293b;
            color: white;
        }
        
        button {
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            white-space: nowrap;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .text-label { font-size: 0.9rem; white-space: nowrap; }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .reset-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 4px 8px;
            font-size: 0.8rem;
        }
        .reset-btn:hover { background: var(--danger); color: white; transform: none; }
        
        /* 모바일 대응: 세로로 분할 */
        @media (max-width: 800px) {
            .content-split { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .control-row { overflow-x: auto; padding-bottom: 5px; }
            .control-row::-webkit-scrollbar { height: 6px; }
            .control-row::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 SSENS RANKING 🏆</h1>

    <div class="content-split">
        <!-- 좌측: 전체 랭킹 -->
        <div class="card-panel">
            <div class="panel-header">🏅 전체 순위표 (클릭 시 전적)</div>
            <div class="scroll-area">
                <div class="ranking-list" id="rankingList">
                    <!-- JS 자동 생성 -->
                </div>
            </div>
        </div>

        <!-- 우측: 개별 전적 로깅 -->
        <div class="card-panel">
            <div class="panel-header" id="historyHeader">📜 전적 기록 (선수 선택)</div>
            <div class="scroll-area">
                <div class="history-list" id="historyList">
                    <div class="empty-history">👈 좌측 명단에서 사람을 선택하면<br>해당 선수의 랭킹 변동 기록이 나타납니다.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 하단 조작부 한 줄 구성 -->
    <div class="control-card">
        <div class="control-row">
            <div class="input-group">
                <select id="challengerSelect"></select>
                <span class="text-label">가</span>
                <select id="targetSelect"></select>
                <span class="text-label">에게</span>
            </div>
            
            <div class="input-group">
                <select id="resultSelect">
                    <option value="win">승리(자리 탈환)</option>
                    <option value="lose">패배(순위 유지)</option>
                </select>
                <span class="text-label">/</span>
                <select id="managerSelect">
                    <option value="">책임자 선택</option>
                </select>
            </div>

            <button onclick="applyResult()">결과 적용</button>
        </div>
    </div>
    
    <div class="footer">
        <span>브라우저 로컬 저장소 사용됨</span>
        <button class="reset-btn" onclick="resetAllData()">전체 데이터(전적 포함) 초기화</button>
    </div>
</div>

<script>
    const INITIAL_PLAYERS = [
        "김진솔", "이상화", "최예지", "최상현", "조준희",
        "한준수", "이진이", "강현민", "김규민", "오유송",
        "신진원", "허 완", "김청하", "박서희", "이지훈",
        "최은주", "방민선", "김승현", "하정유", "성스레"
    ];

    let players = [];
    let matchHistory = [];
    let selectedPlayer = null;

    // 로컬 스토리지 로드
    function loadData() {
        const savedPlayers = localStorage.getItem('ssens_squash_rankings');
        if (savedPlayers) {
            try {
                players = JSON.parse(savedPlayers);
                if (players.length === 0) players = [...INITIAL_PLAYERS];
            } catch (e) { players = [...INITIAL_PLAYERS]; }
        } else {
            players = [...INITIAL_PLAYERS];
        }

        const savedHistory = localStorage.getItem('ssens_squash_history');
        if(savedHistory) {
            try { matchHistory = JSON.parse(savedHistory); } catch(e) { matchHistory = []; }
        }
    }

    function saveData() {
        localStorage.setItem('ssens_squash_rankings', JSON.stringify(players));
        localStorage.setItem('ssens_squash_history', JSON.stringify(matchHistory));
    }

    // 시간 형식화 함수
    function formatDate(isoString) {
        const date = new Date(isoString);
        return `${date.getFullYear().toString().slice(2)}년 ${date.getMonth()+1}월 ${date.getDate()}일 ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
    }

    // 특정 선수 선택 처리
    function selectPlayer(name) {
        selectedPlayer = name;
        document.getElementById('historyHeader').textContent = `📜 [${name}] 선수의 전적`;
        renderRanking(); // 선택 항목 하이라이트 갱신
        renderHistory(); // 히스토리 갱신
    }

    // 히스토리 화면 렌더링
    function renderHistory() {
        const histDiv = document.getElementById('historyList');
        histDiv.innerHTML = '';

        if (!selectedPlayer) {
            histDiv.innerHTML = '<div class="empty-history">👈 좌측 명단에서 사람을 선택하면<br>해당 선수의 최근 경기와 랭킹 변동 알림이 나타납니다.</div>';
            return;
        }

        // 해당 선수와 관련된 모든 로그 역순(최신순)으로 추출
        const relatedHistory = [...matchHistory].reverse().filter(log => 
            log.challengerName === selectedPlayer || 
            log.targetName === selectedPlayer || 
            (log.downedPlayers && log.downedPlayers.includes(selectedPlayer))
        );

        if (relatedHistory.length === 0) {
            histDiv.innerHTML = `<div class="empty-history">최근 누적된 경기 기록이 없습니다.</div>`;
            return;
        }

        relatedHistory.forEach(log => {
            const div = document.createElement('div');
            let logClass = "history-item ";
            let titleHtml = "";
            let descHtml = "";

            // 도전자 본인인 경우
            if (log.challengerName === selectedPlayer) {
                if (log.isWin) {
                    logClass += "win";
                    titleHtml = `<div class="hist-title up">순위 상승 (${log.chOldRank}위 ➡️ ${log.chNewRank}위)</div>`;
                    descHtml = `대상: <b>${log.targetName}</b> 선수에게 도전하여 승리!`;
                } else {
                    logClass += "lose";
                    titleHtml = `<div class="hist-title same">순위 유지 (${log.chOldRank}위)</div>`;
                    descHtml = `대상: <b>${log.targetName}</b> 선수에게 도전하였으나 패배.`;
                }
            } 
            // 방어자 본인인 경우
            else if (log.targetName === selectedPlayer) {
                if (log.isWin) {
                    logClass += "down";
                    titleHtml = `<div class="hist-title down">순위 하락 (${log.tgtOldRank}위 ➡️ ${log.tgtOldRank + 1}위)</div>`;
                    descHtml = `원인: <b>${log.challengerName}</b> 선수의 도전에 방어 실패.`;
                } else {
                    logClass += "lose";
                    titleHtml = `<div class="hist-title same">순위 유지 (${log.tgtOldRank}위)</div>`;
                    descHtml = `원인: <b>${log.challengerName}</b> 선수의 도전을 훌륭하게 방어함.`;
                }
            } 
            // 자리에 의해 도미노 하락한 주변 인물인 경우
            else if (log.isWin && log.downedPlayers && log.downedPlayers.includes(selectedPlayer)) {
                logClass += "down";
                titleHtml = `<div class="hist-title down">순위 1계단 하락</div>`;
                descHtml = `상황: <b>${log.challengerName}</b> 선수가 도전에 성공하며 한 칸 밀려남.`;
            }

            div.className = logClass;
            div.innerHTML = `
                <div class="hist-date">🕒 ${formatDate(log.date)}</div>
                ${titleHtml}
                <div>${descHtml}</div>
                <div class="hist-manager">✔️ 승인 담당자: ${log.managerName}</div>
            `;
            histDiv.appendChild(div);
        });
    }

    // 랭킹 리스트 렌더링
    function renderRanking() {
        const listDiv = document.getElementById('rankingList');
        listDiv.innerHTML = '';

        players.forEach((player, index) => {
            const div = document.createElement('div');
            // 선택된 항목이면 .selected 부여
            div.className = `rank-item rank-${index + 1} ${selectedPlayer === player ? 'selected' : ''}`;
            div.onclick = () => selectPlayer(player); // 클릭 이벤트 추가
            
            const rankSpan = document.createElement('span');
            rankSpan.className = 'rank-number';
            rankSpan.textContent = `${index + 1}위`;

            const nameSpan = document.createElement('span');
            nameSpan.className = 'rank-name';
            nameSpan.textContent = player;

            div.appendChild(rankSpan);
            div.appendChild(nameSpan);
            listDiv.appendChild(div);
        });
    }

    // 도전자 콤보박스 세팅
    function populateChallengers() {
        const chalSelect = document.getElementById('challengerSelect');
        chalSelect.innerHTML = '';

        for (let i = 1; i < players.length; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `${i + 1}위 ${players[i]}`;
            chalSelect.appendChild(option);
        }

        chalSelect.addEventListener('change', updateTargets);
        updateTargets();
    }

    // 대상자 콤보박스 업데이트
    function updateTargets() {
        const chalSelect = document.getElementById('challengerSelect');
        const tgtSelect = document.getElementById('targetSelect');
        tgtSelect.innerHTML = '';

        const ch_idx = parseInt(chalSelect.value);
        if (isNaN(ch_idx)) return;

        const startIdx = Math.max(0, ch_idx - 3);
        const endIdx = ch_idx - 1;

        for (let i = endIdx; i >= startIdx; i--) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `${i + 1}위 ${players[i]}`;
            tgtSelect.appendChild(option);
        }
    }

    // 책임자 콤보박스 세팅 (선수 명단 오름차순 삽입)
    function populateManagers() {
        const mgrSelect = document.getElementById('managerSelect');
        mgrSelect.innerHTML = '<option value="">책임자 선택</option>';
        
        let sortedPlayers = [...INITIAL_PLAYERS].sort();
        sortedPlayers.forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            mgrSelect.appendChild(option);
        });
    }

    // 결과 적용 로직 (히스토리 저장 추가)
    function applyResult() {
        const chalSelect = document.getElementById('challengerSelect');
        const tgtSelect = document.getElementById('targetSelect');
        const resultSelect = document.getElementById('resultSelect');
        const mgrSelect = document.getElementById('managerSelect');

        const ch_idx = parseInt(chalSelect.value);
        const tgt_idx = parseInt(tgtSelect.value);

        if (isNaN(ch_idx) || isNaN(tgt_idx)) {
            alert('도전자와 대상자를 정확히 선택해주세요!'); return;
        }
        if (!mgrSelect.value) {
            alert('판정을 승인할 책임자를 선택해주세요!'); return;
        }

        const isWin = (resultSelect.value === 'win');
        const challengerName = players[ch_idx];
        const targetName = players[tgt_idx];
        const managerName = mgrSelect.value;
        
        // 로그 객체 준비
        const logEntry = {
            date: new Date().toISOString(),
            challengerName,
            targetName,
            isWin,
            managerName,
            chOldRank: ch_idx + 1,
            tgtOldRank: tgt_idx + 1,
            chNewRank: tgt_idx + 1, // 승리했을 경우의 순위
            downedPlayers: [] // 승리로 인해 밀려난 사람들
        };

        if (isWin) {
            // 밀려날 사람들 명단 저장 (대상자부터 도전자 앞사람까지 모두 한 칸씩 밀림)
            logEntry.downedPlayers = players.slice(tgt_idx, ch_idx);

            // 배열 위치 변경
            const movedPlayer = players.splice(ch_idx, 1)[0];
            players.splice(tgt_idx, 0, movedPlayer);

            matchHistory.push(logEntry);
            
            saveData();
            renderRanking();
            if(selectedPlayer) renderHistory(); // 기존에 열어둔 히스토리가 있으면 갱신
            populateChallengers();
            
            setTimeout(() => { alert(`🎉 [책임자: ${managerName}] 승인 완료`); }, 100);
        } else {
            // 패배 기록도 저장 (순위변동 없으므로 downedPlayers 누락)
            matchHistory.push(logEntry);
            
            saveData();
            if(selectedPlayer) renderHistory();
            
            setTimeout(() => { alert(`💧 [책임자: ${managerName}] 승인 완료`); }, 100);
        }
    }

    function resetAllData() {
        if(confirm("모든 랭킹과 누적된 과거 전적 기록이 완전히 지워집니다. 진행하시겠습니까?")) {
            players = [...INITIAL_PLAYERS];
            matchHistory = [];
            selectedPlayer = null;
            document.getElementById('historyHeader').textContent = `📜 전적 기록 (선수 선택)`;
            
            saveData();
            renderRanking();
            renderHistory();
            populateChallengers();
        }
    }

    window.onload = () => {
        loadData();
        renderRanking();
        populateChallengers();
        populateManagers();
    };
</script>
</body>
</html>
